version: 2
updates:
  # Python 依赖 (使用 pip，因为 uv 兼容 pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    reviewers:
      - "lycohana"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # 分组更新
    groups:
      pytest:
        patterns:
          - "pytest*"
      fastapi:
        patterns:
          - "fastapi*"
          - "uvicorn*"
          - "starlette*"

  # Node.js 依赖 (桌面应用)
  - package-ecosystem: "npm"
    directory: "/apps/desktop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 5
    reviewers:
      - "lycohana"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # 分组更新
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      electron:
        patterns:
          - "electron*"
      vite:
        patterns:
          - "vite*"
          - "@vitejs/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
