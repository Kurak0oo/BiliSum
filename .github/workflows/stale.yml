name: "关闭不活跃的 Issues 和 PRs"

on:
  schedule:
    # 每天凌晨 1 点运行
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issue 配置
          stale-issue-message: |
            👋 这个 Issue 已经 30 天没有活动了。

            如果问题仍然存在，请：
            - 回复此 Issue 说明当前状态
            - 提供更多信息或复现步骤
            - 确认使用的是最新版本

            如果没有后续回复，此 Issue 将在 7 天后自动关闭。
          close-issue-message: |
            🔒 此 Issue 因长时间不活跃已自动关闭。

            如果问题仍未解决，欢迎：
            - 重新打开此 Issue 并提供最新信息
            - 创建新的 Issue 并引用此 Issue
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,critical,help-wanted,good-first-issue'

          # PR 配置
          stale-pr-message: |
            👋 这个 PR 已经 30 天没有活动了。

            请：
            - 解决合并冲突（如果有）
            - 回复审查意见
            - 确认是否继续推进

            如果没有后续活动，此 PR 将在 7 天后自动关闭。
          close-pr-message: |
            🔒 此 PR 因长时间不活跃已自动关闭。

            如果仍想合并此 PR，欢迎：
            - 重新打开并更新代码
            - 创建新的 PR
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,critical,work-in-progress'

          # 全局配置
          operations-per-run: 100
          remove-stale-when-updated: true
          ascending: true
